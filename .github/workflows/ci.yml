name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '8.0.x' ]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore MemQueue.slnx

      - name: Build
        run: dotnet build MemQueue.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/MemQueue.Tests/MemQueue.Tests.csproj --no-build --configuration Release --verbosity normal
